services:
  butler-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: butler-c270-final:latest
    container_name: butler-c270-final-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
